# Railway deployment config — backend only
# Docs: https://docs.railway.com/reference/config-as-code

[build]
# Build context = raíz del repo (el Dockerfile lo necesita para acceder a uv.lock y backend/)
dockerfilePath = "backend/Dockerfile"
buildContext = "."

[deploy]
# Corre migraciones + initial_data ANTES de levantar el servidor
# Railway inyecta $PORT automáticamente; fastapi run lo lee con ${PORT:-8000}
startCommand = "bash scripts/prestart.sh && fastapi run --workers 2 app/main.py --port ${PORT:-8000}"
healthcheckPath = "/api/v1/utils/health-check/"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
