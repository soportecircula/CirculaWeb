<div class="modal-header border-bottom-0 pb-0">
  <h5 class="modal-title fw-semibold">
    <i class="mdi mdi-clock-alert-outline text-warning me-2"></i>
    Sesión por expirar
  </h5>
</div>
<div class="modal-body text-center py-4">
  <p class="text-muted mb-3">Tu sesión expirará pronto por inactividad.</p>
  <div class="display-5 fw-bold text-warning mb-1">
    {{ minutes }}:{{ secondsDisplay }}
  </div>
  <small class="text-muted">tiempo restante</small>
</div>
<div class="modal-footer border-top-0 justify-content-center gap-2">
  <button type="button" class="btn btn-primary" (click)="stay()">Continuar sesión</button>
</div>
